# Decap CMS — edit at https://yixuan-own-blog.vercel.app/admin/
# OAuth setup: see ADMIN_SETUP.md in the project root

backend:
  name: github
  repo: yixuan1112-coder/yixuan_own_blog
  branch: main
  base_url: https://yixuan-own-blog.vercel.app
  auth_endpoint: api/auth

# Optional: run `npx decap-server` locally for testing without OAuth
# local_backend: true

media_folder: src/assets/blog
public_folder: ../../assets/blog

site_url: https://yixuan-own-blog.vercel.app
display_url: https://yixuan-own-blog.vercel.app
logo_url: https://yixuan-own-blog.vercel.app/favicon.svg

slug:
  clean_accents: true

collections:
  - name: blog
    label: Blog Posts
    label_singular: Blog Post
    folder: src/content/blog
    create: true
    slug: '{{slug}}'
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: string, hint: 'Short summary for SEO and blog list' }
      - { label: Publish Date, name: pubDate, widget: datetime, format: 'MMM DD YYYY', date_format: 'MMM DD YYYY', time_format: false }
      - { label: Updated Date, name: updatedDate, widget: datetime, required: false, format: 'MMM DD YYYY', date_format: 'MMM DD YYYY', time_format: false }
      - { label: Cover Image, name: heroImage, widget: image, required: false, hint: 'Optional cover image' }
      - label: Body
        name: body
        widget: markdown
        hint: 'Embed videos with YouTube/Bilibili iframe HTML in the editor'
