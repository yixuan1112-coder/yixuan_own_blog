# Yixuan's website — Decap CMS 后台
# 线上地址：https://yixuan-own-blog.vercel.app/admin/
# OAuth 配置见项目根目录 ADMIN_SETUP.md

backend:
  name: github
  repo: yixuan1112-coder/yixuan_own_blog
  branch: main
  base_url: https://yixuan-own-blog.vercel.app
  auth_endpoint: api/auth

media_folder: src/assets/blog
public_folder: ../../assets/blog

site_url: https://yixuan-own-blog.vercel.app
display_url: https://yixuan-own-blog.vercel.app
logo_url: https://yixuan-own-blog.vercel.app/favicon.svg

slug:
  clean_accents: true

collections:
  - name: blog
    label: 博客文章
    label_singular: 文章
    folder: src/content/blog
    create: true
    slug: '{{slug}}'
    extension: md
    format: frontmatter
    fields:
      - { label: 标题, name: title, widget: string }
      - { label: 摘要, name: description, widget: string, hint: '用于博客列表与 SEO' }
      - { label: 发布日期, name: pubDate, widget: datetime, format: 'MMM DD YYYY', date_format: 'MMM DD YYYY', time_format: false }
      - { label: 更新日期, name: updatedDate, widget: datetime, required: false, format: 'MMM DD YYYY', date_format: 'MMM DD YYYY', time_format: false }
      - { label: 封面图, name: heroImage, widget: image, required: false }
      - label: 正文
        name: body
        widget: markdown
        hint: '视频可粘贴 YouTube / Bilibili 的 iframe 嵌入代码'
